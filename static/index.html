<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Face Scan</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; max-width: 700px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
    h1 { font-size: 1.6rem; margin-bottom: 4px; }
    p  { color: #555; margin-top: 4px; }

    .actions { display: flex; gap: 10px; margin: 16px 0; flex-wrap: wrap; }
    .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-secondary { background: #fff; border: 1px solid #ccc; }
    .btn:disabled { opacity: 0.5; cursor: default; }

    /* Camera panel */
    #cameraPanel { display: none; margin-bottom: 16px; }
    #videoEl { width: 100%; max-height: 400px; border-radius: 8px; background: #000; display: block; }
    .cam-controls { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }

    /* Preview */
    #previewWrap { display: none; margin-bottom: 16px; }
    #previewImg { max-width: 100%; max-height: 300px; border-radius: 8px; border: 2px solid #2563eb; }

    #status { margin: 10px 0; color: #333; min-height: 20px; display: flex; align-items: center; gap: 8px; }
    .spinner { display: none; width: 16px; height: 16px; border: 2px solid #ccc; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #results { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 8px; text-align: center; width: 150px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .card img { width: 100%; height: 120px; object-fit: cover; border-radius: 4px; }
    .score { font-size: 0.8rem; color: #555; margin-top: 4px; }
    .fname { font-size: 0.65rem; color: #888; word-break: break-all; margin-top: 2px; }
  </style>
</head>
<body>
  <h1>Face Scan</h1>
  <p>Capture or upload a face photo to find matches.</p>

  <div class="actions">
    <button class="btn btn-primary" onclick="openCamera()">📷 Use Camera</button>
    <label class="btn btn-secondary" style="display:inline-block">
      🖼 Upload Photo
      <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="fileSelected(this)" />
    </label>
  </div>

  <!-- Live camera -->
  <div id="cameraPanel">
    <video id="videoEl" autoplay playsinline></video>
    <div class="cam-controls">
      <button class="btn btn-primary" onclick="capture()">📸 Capture</button>
      <button class="btn btn-secondary" onclick="flipCamera()">🔄 Flip</button>
      <button class="btn btn-secondary" onclick="closeCamera()">✕ Close</button>
    </div>
  </div>

  <!-- Preview of captured/selected image -->
  <div id="previewWrap">
    <img id="previewImg" />
    <div class="cam-controls">
      <button class="btn btn-primary" onclick="search()">🔍 Search</button>
      <button class="btn btn-secondary" onclick="clearPreview()">✕ Clear</button>
    </div>
  </div>

  <!-- Hidden canvas for capture -->
  <canvas id="canvas" style="display:none"></canvas>

  <div id="status"><div class="spinner" id="spinner"></div><span id="statusText"></span></div>
  <div id="results"></div>

  <script>
    let stream = null;
    let facingMode = 'user';  // front camera default
    let capturedBlob = null;
    let activeController = null;  // AbortController for in-flight search

    // ── Camera ──────────────────────────────────────────────────
    async function openCamera() {
      closeCamera();
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        document.getElementById('videoEl').srcObject = stream;
        document.getElementById('cameraPanel').style.display = 'block';
        setStatus('');
      } catch (e) {
        setStatus('Camera error: ' + e.message);
      }
    }

    async function flipCamera() {
      facingMode = facingMode === 'user' ? 'environment' : 'user';
      await openCamera();
    }

    function closeCamera() {
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      document.getElementById('cameraPanel').style.display = 'none';
    }

    function capture() {
      const video = document.getElementById('videoEl');
      const canvas = document.getElementById('canvas');
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      canvas.toBlob(blob => {
        capturedBlob = blob;
        showPreview(blob);
        closeCamera();
      }, 'image/jpeg', 0.92);
    }

    // ── File upload ─────────────────────────────────────────────
    function fileSelected(input) {
      if (!input.files[0]) return;
      capturedBlob = input.files[0];
      showPreview(capturedBlob);
    }

    // ── Preview ─────────────────────────────────────────────────
    function showPreview(blob) {
      const url = URL.createObjectURL(blob);
      document.getElementById('previewImg').src = url;
      document.getElementById('previewWrap').style.display = 'block';
      document.getElementById('results').innerHTML = '';
      setStatus('');
    }

    function clearPreview() {
      capturedBlob = null;
      document.getElementById('previewWrap').style.display = 'none';
      document.getElementById('previewImg').src = '';
      document.getElementById('results').innerHTML = '';
      setStatus('');
    }

    // ── Search ──────────────────────────────────────────────────
    async function search() {
      if (!capturedBlob) { setStatus('Capture or upload a photo first.'); return; }

      // Cancel any in-flight request before starting a new one.
      if (activeController) { activeController.abort(); }
      activeController = new AbortController();

      setStatus('Searching…', true);
      document.getElementById('results').innerHTML = '';

      const form = new FormData();
      form.append('file', capturedBlob, 'face.jpg');

      try {
        const res  = await fetch('/search', { method: 'POST', body: form, signal: activeController.signal });
        activeController = null;
        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch { data = null; }
        if (!res.ok) {
          setStatus('Error ' + res.status + ': ' + (data?.detail || text.slice(0, 200) || res.statusText));
          return;
        }

        setStatus(`Found ${data.total} match(es).`);
        const container = document.getElementById('results');
        data.results.forEach(r => {
          const card = document.createElement('div');
          card.className = 'card';
          const imgUrl = '/photo?path=' + encodeURIComponent(r.image_id);
          const fname  = r.image_id.split(/[\\/]/).pop();
          card.innerHTML = `
            <img src="${imgUrl}" loading="lazy" onerror="this.style.display='none'" />
            <div class="score">Score: ${r.score.toFixed(3)}</div>
            <div class="fname">${fname}</div>
          `;
          container.appendChild(card);
        });
      } catch (e) {
        if (e.name === 'AbortError') return;  // superseded by a newer search
        setStatus('Request failed: ' + e.message);
      }
    }

    function setStatus(msg, loading = false) {
      document.getElementById('statusText').textContent = msg;
      document.getElementById('spinner').style.display = loading ? 'block' : 'none';
    }
  </script>
</body>
</html>
